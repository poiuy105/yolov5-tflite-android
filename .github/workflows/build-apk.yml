name: Build Android APK - Person Detector

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify model files exist in assets
        run: |
          echo "=== Assets files ==="
          ls -lh app/src/main/assets/*.tflite

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: List build outputs
        run: |
          echo "=== Debug APK ==="
          ls -lh app/build/outputs/apk/debug/
          echo "=== Release APK ==="
          ls -lh app/build/outputs/apk/release/

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: person-detector-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: person-detector-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Person Detector v1.0.${{ github.run_number }}"
          body: |
            ## Person Detector - Android APK

            ### Features
            - Real-time person detection using YOLOv5 (COCO person class)
            - Camera-based real-time detection with front/back camera switch
            - Multiple model support: yolov5s, yolov5n, yolov5m, yolov5s-int8
            - Adjustable detection threshold
            - Detection count and FPS display
            - Screenshot save to gallery
            - Full-screen / aspect-ratio display modes

            ### Model Info
            - **Base models**: YOLOv5s/n/m (320x320, FP16/INT8)
            - **Detection class**: person only (COCO class 0)
            - **Input size**: 320x320 (optimized for mobile)

            ### Installation
            1. Download the APK file
            2. Enable "Install from unknown sources" in Android settings
            3. Install the APK
            4. Grant camera permission when prompted

            ### Requirements
            - Android 7.0+ (API 24+)
            - Camera permission
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
