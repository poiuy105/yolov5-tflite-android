name: Build Android APK with CrowdHuman Model

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download CrowdHuman TFLite model
        run: |
          wget -q --show-progress \
            -O app/src/main/assets/crowdhuman_vbody_yolov5m.tflite \
            "https://github.com/poiuy105/crowdhuman-yolov5m-tflite/releases/download/v1.0.0-tflite/crowdhuman_vbody_yolov5m.tflite"
          ls -lh app/src/main/assets/crowdhuman_vbody_yolov5m.tflite
          FILE_SIZE=$(stat -c%s app/src/main/assets/crowdhuman_vbody_yolov5m.tflite)
          echo "Model file size: $FILE_SIZE bytes"
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "ERROR: Downloaded model file is too small"
            exit 1
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug

      - name: List build outputs
        run: |
          ls -lh app/build/outputs/apk/debug/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: crowdhuman-detector-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-apk
          name: "CrowdHuman Person Detector APK v1.0.0"
          body: |
            ## CrowdHuman Person Detector - Android APK

            ### Features
            - Real-time person detection using YOLOv5m trained on CrowdHuman dataset
            - Supports crowded scenes (back view, side view, partial occlusion)
            - Camera-based real-time detection
            - Switch between CrowdHuman model and standard COCO models

            ### Model Info
            - **Base model**: YOLOv5m
            - **Training dataset**: CrowdHuman
            - **Classes**: person (single class)
            - **Input size**: 320x320 (optimized for mobile)

            ### Installation
            1. Download the APK file
            2. Enable "Install from unknown sources" in Android settings
            3. Install the APK
            4. Grant camera permission when prompted

            ### Usage
            - Open the app
            - Point camera at people
            - The app will detect and draw bounding boxes around persons
            - Use the dropdown to switch between models

            ### Requirements
            - Android 5.0+ (API 21+)
            - Camera permission
          files: app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
