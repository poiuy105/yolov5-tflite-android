name: Export YOLOv5n 160x160 TFLite Model

on:
  workflow_dispatch:

jobs:
  export-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install onnx onnx-simplifier onnxruntime
          pip install tensorflow-cpu pandas pyyaml tqdm requests

      - name: Clone YOLOv5 and export model
        run: |
          git clone https://github.com/ultralytics/yolov5.git --depth 1
          cd yolov5
          python export.py --weights yolov5n.pt --img-size 160 --batch-size 1 --include tflite --half
          cd ..

      - name: Move and verify exported model
        run: |
          find yolov5 -name '*160*tflite*' -o -name '*fp16*tflite*' | head -10
          EXPORTED=$(find yolov5 -name '*float16*tflite*' -o -name '*fp16*tflite*' 2>/dev/null | head -1)
          if [ -z "$EXPORTED" ]; then
            EXPORTED=$(find yolov5 -name 'yolov5n*tflite*' | head -1)
          fi
          if [ -n "$EXPORTED" ]; then
            cp "$EXPORTED" ./yolov5n-fp16-160.tflite
          fi
          ls -la yolov5n-fp16-160.tflite

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolov5n-160-model
          path: yolov5n-fp16-160.tflite
